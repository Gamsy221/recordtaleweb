<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recordtale | About</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html" aria-label="Recordtale Home">
        <img src="logo.png" alt="Recordtale Logo" />
      </a>
      <button class="menu-toggle" aria-expanded="false" aria-controls="mobile-nav" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="desktop-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
    <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile primary">
      <a href="index.html">Home</a>
      <a href="about.html" class="active">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="placeholder-main">
    <section class="placeholder-panel">
      <h1 class="placeholder-title">About</h1>
      <p class="placeholder-text">This is a temporary About page placeholder for Recordtale.</p>
    </section>
  </main>

  <script>
    const toggleButton = document.querySelector('.menu-toggle');
    const mobileNav = document.getElementById('mobile-nav');
    toggleButton.addEventListener('click', () => {
      const isExpanded = toggleButton.getAttribute('aria-expanded') === 'true';
      toggleButton.setAttribute('aria-expanded', String(!isExpanded));
      mobileNav.classList.toggle('open');
    });
  </script>
</body>
</html>
